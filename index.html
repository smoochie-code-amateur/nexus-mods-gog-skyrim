<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOG Skyrim Mod Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans:wght@300;400;600;700&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="lang-switch">
        <button id="langBtn" title="Switch language">UA</button>
      </div>
      <div class="logo-area">
        <div class="divider-ornate left"></div>
        <h1 id="mainTitle">GOG Skyrim Mod Checker</h1>
        <div class="divider-ornate right"></div>
      </div>
      <p class="subtitle" id="mainSubtitle">Перевірка сумісності модів Nexus Mods із GOG-версією Skyrim SE</p>
    </header>

    <div id="keyView">
      <div class="key-box">
        <h2 id="keyTitle">Потрібен API-ключ Nexus Mods</h2>
        <p id="keyDesc">
          Цей сайт використовує
          <a href="https://www.nexusmods.com/skyrimspecialedition" target="_blank">Nexus Mods</a>
          API для пошуку та перевірки модів. Введіть ваш особистий API-ключ.
        </p>
        <a id="keyLink" class="key-link" href="https://www.nexusmods.com/users/myaccount?tab=api" target="_blank">
          Отримати API-ключ →</a>
        <div class="key-input-row">
          <input type="text" id="keyInput" placeholder="API-ключ Nexus Mods...">
          <button id="keyBtn">Зберегти</button>
        </div>
        <div id="keyError" class="hidden"></div>
      </div>
    </div>

    <div id="appView" class="hidden">
      <div class="key-info">
        <span id="keySavedText">Ключ збережено ·</span>
        <button id="changeKeyBtn">Змінити ключ</button>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Назва мода або Nexus ID..." autofocus>
        <button id="searchBtn">Перевірити</button>
      </div>
      <div id="results"></div>
      <div id="error" class="hidden"></div>
    </div>
  </div>

  <footer>
    <div class="footer-divider"></div>
    <p id="footerText">Дані з <a href="https://www.nexusmods.com/skyrimspecialedition" target="_blank">Nexus Mods</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
